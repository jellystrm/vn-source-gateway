# Date: 2025-06-01
# https://github.com/jellystrm/vn-source-gateway
services:
  vn-source-gateway:
    image: ghcr.io/jellystrm/vn-source-gateway:latest
    container_name: vn-source-gateway
    network_mode: host
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL}
      - TORZNAB_API_KEY=${TORZNAB_API_KEY}
      - TMDB_API_KEY=${TMDB_API_KEY}
      - SERVER_LABELS=${SERVER_LABELS}
      - QB_USERNAME=${QB_USERNAME}
      - QB_PASSWORD=${QB_PASSWORD}
      - DEFAULT_OUTPUT_MODE=${DEFAULT_OUTPUT_MODE}
      - EXPOSE_BOTH_MODES=${EXPOSE_BOTH_MODES}
      - DOWNLOAD_ROOT=${DOWNLOAD_ROOT}
      - MOVIE_STRM_ROOT=${MOVIE_STRM_ROOT}
      - SERIES_STRM_ROOT=${SERIES_STRM_ROOT}
      - DOWNLOAD_CONTAINER=${DOWNLOAD_CONTAINER}
      - POLL_INTERVAL_SECONDS=${POLL_INTERVAL_SECONDS}
      - LOG_LEVEL=${LOG_LEVEL}
      - UI_PORT=${UI_PORT}
    volumes:
      # Thư mục cấu hình
      - /appdata/vn-source-gateway:/config

      # Thư mục tải về (Phải giống hệt Radarr/Sonarr)
      - /srv/mergerfs/MainPool/downloads:/downloads

      # Thư mục phim và series (Phải giống hệt Jellyfin)
      - /srv/mergerfs/MainPool/Phim:/movies
      - /srv/mergerfs/MainPool/Series:/shows

    restart: unless-stopped
