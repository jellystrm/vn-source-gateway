services:
  vn-source-gateway:
    image: ghcr.io/jellystrm/vn-source-gateway:latest
    container_name: vn-source-gateway
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL}
      - TORZNAB_API_KEY=${TORZNAB_API_KEY}
      - TMDB_API_KEY=${TMDB_API_KEY}
      - SERVER_LABELS=${SERVER_LABELS}
      - QB_USERNAME=${QB_USERNAME}
      - QB_PASSWORD=${QB_PASSWORD}
      - DEFAULT_OUTPUT_MODE=${DEFAULT_OUTPUT_MODE}
      - EXPOSE_BOTH_MODES=${EXPOSE_BOTH_MODES}
      - DOWNLOAD_ROOT=${DOWNLOAD_ROOT}
      - MOVIE_STRM_ROOT=${MOVIE_STRM_ROOT}
      - SERIES_STRM_ROOT=${SERIES_STRM_ROOT}
      - DOWNLOAD_CONTAINER=${DOWNLOAD_CONTAINER}
      - POLL_INTERVAL_SECONDS=${POLL_INTERVAL_SECONDS}
      - LOG_LEVEL=${LOG_LEVEL}
      - UI_PORT=${UI_PORT}
    ports:
      - ${UI_PORT}:${UI_PORT}
    volumes:
      - ${APPDATA_PATH}/vn-source-gateway/state:/state
      - ${APPDATA_PATH}/vn-source-gateway/config:/config
      - ${DOWNLOADS_PATH}:/downloads
      - ${MOVIES_PATH}:/movies
      - ${SHOWS_PATH}:/shows
    restart: unless-stopped
